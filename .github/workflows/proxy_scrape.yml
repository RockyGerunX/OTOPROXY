name: Proxy Scrape and Check

on:
  schedule:
    - cron: "0 */3 * * *"  # Menjalankan setiap 3 jam
  workflow_dispatch:  # Memungkinkan workflow untuk dijalankan secara manual

jobs:
  scrape_and_check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python 3.x
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Install dependencies dari requirements.txt

      - name: Run OTOPROXY Script
        run: |
          python otoproxy.py

      - name: Set up Git credentials for pushing
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Commit and Push valid_proxies.txt
        run: |
          git add .github/generate/valid_proxies.txt
          git commit -m "Update valid proxies"
          git push origin main
